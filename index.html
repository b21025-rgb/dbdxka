<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>확률 게임 아케이드</title>
<style>
:root{--bg:#F4F1EA;--bg2:#FAF8F3;--panel:#EBE7DC;--panel2:#E4DFD2;--point:#778B73;--text:#5F4541;--muted:#806B67;--line:#6B423D;--button:#556B2F;--white:#fff;--shadow:0 24px 60px rgba(95,69,65,.18)}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:Inter,Pretendard,"Noto Sans KR",system-ui,sans-serif;color:var(--text);background:var(--bg)}button{font:inherit}
.launcher{min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at 15% 10%,rgba(255,255,255,.65),transparent 30%),radial-gradient(circle at 88% 82%,rgba(119,139,115,.18),transparent 30%),linear-gradient(145deg,var(--bg),var(--bg2))}
.launcher.hidden{display:none}.hero{width:min(920px,100%);padding:32px;border:1px solid var(--line);border-radius:30px;background:rgba(250,248,243,.94);box-shadow:var(--shadow)}
.eyebrow{color:var(--point);font-weight:900;font-size:.8rem;letter-spacing:.12em}h1{font-size:clamp(2.3rem,7vw,4.8rem);letter-spacing:-.07em;margin:8px 0 10px}.intro{max-width:650px;color:var(--muted);line-height:1.75;margin:0 0 28px}
.games{display:grid;grid-template-columns:1fr 1fr;gap:18px}.game-card{min-height:280px;display:flex;flex-direction:column;padding:24px;border:1px solid var(--line);border-radius:24px;background:linear-gradient(160deg,var(--panel),var(--panel2));box-shadow:0 14px 30px rgba(95,69,65,.1);transition:.18s}
.game-card:hover{transform:translateY(-4px)}.icon{font-size:3.2rem}.game-card h2{font-size:1.7rem;margin:15px 0 8px}.game-card p{color:var(--muted);line-height:1.65;margin:0 0 18px}.tags{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:20px}.tag{padding:6px 9px;border-radius:999px;background:var(--bg2);border:1px solid rgba(107,66,61,.35);font-size:.75rem;font-weight:800}
.play{width:100%;margin-top:auto;border:0;border-radius:14px;padding:14px 16px;color:var(--white);background:var(--button);font-weight:900;cursor:pointer}.yacht .play{background:var(--point)}
.runner{position:fixed;inset:0;display:none;background:var(--bg);z-index:10}.runner.show{display:block}.runner-bar{height:58px;display:flex;align-items:center;justify-content:space-between;padding:9px 14px;border-bottom:1px solid var(--line);background:var(--bg2)}.runner-title{font-weight:950}.back{border:1px solid var(--line);border-radius:11px;padding:9px 12px;background:var(--panel);color:var(--text);font-weight:850;cursor:pointer}iframe{width:100%;height:calc(100vh - 58px);border:0;background:var(--bg)}
@media(max-width:720px){.launcher{padding:12px}.hero{padding:21px}.games{grid-template-columns:1fr}.game-card{min-height:245px}}
</style>
</head>

<main class="launcher" id="launcher">
<section class="hero">
<div class="eyebrow">PROBABILITY GAME ARCADE</div>
<h1>확률게임</h1>
<p class="intro">확률을 직접 확인하며 플레이하는 두 가지 게임입니다. 원하는 게임을 선택하면 각 게임의 설정 화면으로 이동합니다.</p>
<div class="games">
<article class="game-card"><div class="icon">💣</div><h2>지뢰찾기 AI</h2><p>숫자 단서를 분석해 가장 안전한 칸의 확률과 분석 신뢰도를 보여줍니다.</p><div class="tags"><span class="tag">난이도 선택</span><span class="tag">추측·비추측</span><span class="tag">AI 안전도</span></div><button class="play" data-game="mine">지뢰찾기 선택</button></article>
<article class="game-card yacht"><div class="icon">🎲</div><h2>확률 요트 다이스</h2><p>현재 주사위와 남은 굴림을 바탕으로 점수 항목별 달성 확률을 계산합니다.</p><div class="tags"><span class="tag">로컬 대전</span><span class="tag">AI 대전</span><span class="tag">조건부 확률</span></div><button class="play" data-game="yacht">요트 다이스 선택</button></article>
</div>
</section>
</main>
<section class="runner" id="runner"><header class="runner-bar"><div class="runner-title" id="runnerTitle"></div><button class="back" id="backBtn">← 게임 선택으로</button></header><iframe id="gameFrame" title="선택한 게임" allow="fullscreen" referrerpolicy="no-referrer"></iframe></section>

function decodeBase64Utf8(value){
  const binary=atob(value);
  const bytes=Uint8Array.from(binary,ch=>ch.charCodeAt(0));
  return new TextDecoder("utf-8").decode(bytes);
}
function openGame(key){
  const g=games[key];
  if(!g)return;
  runnerTitle.textContent=g.title;
  frame.removeAttribute("src");
  frame.srcdoc=decodeBase64Utf8(g.data);
  launcher.classList.add("hidden");
  runner.classList.add("show");
  window.scrollTo(0,0);
}
function closeGame(){
  frame.srcdoc="";
  frame.removeAttribute("src");
  runner.classList.remove("show");
  launcher.classList.remove("hidden");
}
document.querySelectorAll("[data-game]").forEach(b=>b.onclick=()=>openGame(b.dataset.game));
document.getElementById("backBtn").onclick=closeGame;
</script>
</body>
</html>
